[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "agent-trace"
version = "0.1.0"
description = "Fail-open Python tracing SDK for Agent-Trace"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }

[tool.setuptools.packages.find]
include = ["agent_trace*"]
