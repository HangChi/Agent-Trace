name: Tauri desktop release validation

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-installer:
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.0.7
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm desktop:build:win
      - name: Verify NSIS installer
        shell: powershell
        run: |
          $installers = @(Get-ChildItem target/release/bundle/nsis -Filter *.exe)
          if ($installers.Count -ne 1) {
            throw "Expected one NSIS installer, found $($installers.Count)."
          }
