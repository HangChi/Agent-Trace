openapi: 3.1.0
info:
  title: Agent-Trace Collector API
  version: 0.0.0-unreleased
  description: |
    Local, unauthenticated Collector API for Agent-Trace. The default server is
    loopback-only and must not be exposed directly to an untrusted network.
servers:
  - url: http://127.0.0.1:4319
    description: Default local Collector
security: []
tags:
  - name: Health
  - name: Runs
  - name: Events
  - name: Integrations
  - name: Usage
paths:
  /health:
    get:
      tags: [Health]
      summary: Check Collector health
      operationId: getHealth
      responses:
        "200":
          description: Collector is ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Health"
  /runs:
    get:
      tags: [Runs]
      summary: List Runs
      description: Returns a bounded Dashboard read model unless legacy mode is requested.
      operationId: listRuns
      parameters:
        - $ref: "#/components/parameters/IncludeUntracked"
        - $ref: "#/components/parameters/RunPage"
        - $ref: "#/components/parameters/RunPageSize"
        - $ref: "#/components/parameters/Legacy"
      responses:
        "200":
          description: Paginated Run page, or an unbounded Run array in legacy mode
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/DashboardRunPage"
                  - type: array
                    items:
                      $ref: "#/components/schemas/Run"
    post:
      tags: [Runs]
      summary: Create a Run
      operationId: createRun
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRun"
      responses:
        "201":
          $ref: "#/components/responses/Ok"
        "400":
          $ref: "#/components/responses/ValidationError"
    delete:
      tags: [Runs]
      summary: Delete multiple Runs
      operationId: deleteRuns
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ids]
              properties:
                ids:
                  type: array
                  minItems: 1
                  items:
                    type: string
                    minLength: 1
      responses:
        "200":
          description: Deletion result
          content:
            application/json:
              schema:
                type: object
                required: [ok, deleted]
                properties:
                  ok:
                    const: true
                  deleted:
                    type: integer
                    minimum: 0
        "400":
          $ref: "#/components/responses/ValidationError"
  /runs/{id}:
    get:
      tags: [Runs]
      summary: Get one Run
      operationId: getRun
      parameters:
        - $ref: "#/components/parameters/RunId"
      responses:
        "200":
          description: Dashboard Run with aggregate metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Run"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [Runs]
      summary: Update Run status and result
      operationId: updateRun
      parameters:
        - $ref: "#/components/parameters/RunId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRun"
      responses:
        "200":
          $ref: "#/components/responses/Ok"
        "400":
          $ref: "#/components/responses/ValidationError"
    delete:
      tags: [Runs]
      summary: Delete one Run and its Events
      operationId: deleteRun
      parameters:
        - $ref: "#/components/parameters/RunId"
      responses:
        "200":
          $ref: "#/components/responses/Ok"
        "404":
          $ref: "#/components/responses/NotFound"
  /runs/{id}/events:
    get:
      tags: [Events]
      summary: List Events for a Run
      description: Returns a filtered, bounded read model unless legacy mode is requested.
      operationId: listRunEvents
      parameters:
        - $ref: "#/components/parameters/RunId"
        - name: visibility
          in: query
          schema:
            type: string
            enum: [display, hidden, all]
            default: display
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 100
        - name: q
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
        - name: type
          in: query
          schema:
            type: string
        - name: category
          in: query
          schema:
            type: string
        - $ref: "#/components/parameters/Legacy"
      responses:
        "200":
          description: Paginated Event page, or an unbounded Event array in legacy mode
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/DashboardEventPage"
                  - type: array
                    items:
                      $ref: "#/components/schemas/Event"
  /events:
    post:
      tags: [Events]
      summary: Create an Event
      operationId: createEvent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEvent"
      responses:
        "201":
          $ref: "#/components/responses/Ok"
        "400":
          $ref: "#/components/responses/ValidationError"
  /integrations/codex/hook:
    post:
      tags: [Integrations]
      summary: Ingest a Codex Hook payload
      operationId: ingestCodexHook
      parameters:
        - $ref: "#/components/parameters/Surface"
        - $ref: "#/components/parameters/SurfaceSource"
      requestBody:
        $ref: "#/components/requestBodies/IntegrationPayload"
      responses:
        "202":
          $ref: "#/components/responses/IngestionResult"
  /integrations/claude-code/hook:
    post:
      tags: [Integrations]
      summary: Ingest a Claude Code Hook payload
      operationId: ingestClaudeCodeHook
      requestBody:
        $ref: "#/components/requestBodies/IntegrationPayload"
      responses:
        "202":
          $ref: "#/components/responses/IngestionResult"
  /integrations/codex/otel/v1/logs:
    post:
      tags: [Integrations]
      summary: Ingest Codex OTLP/HTTP JSON logs
      operationId: ingestCodexOtelLogs
      parameters:
        - $ref: "#/components/parameters/Surface"
        - $ref: "#/components/parameters/SurfaceSource"
      requestBody:
        $ref: "#/components/requestBodies/IntegrationPayload"
      responses:
        "202":
          $ref: "#/components/responses/IngestionResult"
  /v1/logs:
    post:
      tags: [Integrations]
      summary: Ingest OTLP/HTTP JSON logs using the desktop-compatible path
      operationId: ingestDesktopOtelLogs
      requestBody:
        $ref: "#/components/requestBodies/IntegrationPayload"
      responses:
        "202":
          $ref: "#/components/responses/IngestionResult"
  /integrations/usage-scan:
    post:
      tags: [Integrations, Usage]
      summary: Replace or merge a local Usage Snapshot
      operationId: ingestUsageScan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [source, rows]
              properties:
                source:
                  const: tokscale
                complete:
                  type: boolean
                explicitClients:
                  type: array
                  items:
                    type: string
                reconciledClients:
                  type: array
                  items:
                    type: string
                transcriptClients:
                  type: array
                  items:
                    type: string
                transcriptSessionIds:
                  type: array
                  items:
                    type: string
                scannedAt:
                  type: string
                  format: date-time
                rows:
                  type: array
                  items:
                    $ref: "#/components/schemas/UsageRow"
                diagnostics:
                  type: array
                  items:
                    type: object
                    additionalProperties: true
                transcripts:
                  type: array
                  items:
                    type: object
                    additionalProperties: true
      responses:
        "202":
          $ref: "#/components/responses/IngestionResult"
  /usage/summary:
    get:
      tags: [Usage]
      summary: Get aggregate local usage
      operationId: getUsageSummary
      responses:
        "200":
          description: Usage totals grouped by client and model
          content:
            application/json:
              schema:
                type: object
                required: [totalTokens, clients, models]
                additionalProperties: true
  /usage/scanner:
    get:
      tags: [Usage]
      summary: Get Scanner status and diagnostics
      operationId: getScannerStatus
      responses:
        "200":
          description: Latest Scanner state
          content:
            application/json:
              schema:
                type: object
                required: [diagnostics]
                properties:
                  scannedAt:
                    type: string
                    format: date-time
                  diagnostics:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
                  error:
                    type: string
components:
  parameters:
    RunId:
      name: id
      in: path
      required: true
      schema:
        type: string
    IncludeUntracked:
      name: includeUntracked
      in: query
      schema:
        type: boolean
        default: false
    RunPage:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    RunPageSize:
      name: pageSize
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 50
    Legacy:
      name: legacy
      in: query
      description: Return the old unbounded array response.
      schema:
        type: boolean
        default: false
    Surface:
      name: surface
      in: query
      schema:
        type: string
    SurfaceSource:
      name: surface_source
      in: query
      schema:
        type: string
  requestBodies:
    IntegrationPayload:
      required: true
      content:
        application/json:
          schema:
            type: object
            additionalProperties: true
  responses:
    Ok:
      description: Operation succeeded
      content:
        application/json:
          schema:
            type: object
            required: [ok]
            properties:
              ok:
                const: true
    ValidationError:
      description: Request failed validation
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: Run was not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    IngestionResult:
      description: Request was accepted; inspect stored and error for normalization result.
      content:
        application/json:
          schema:
            type: object
            required: [ok]
            properties:
              ok:
                const: true
              stored:
                oneOf:
                  - type: boolean
                  - type: integer
                    minimum: 0
              runId:
                type: string
              eventId:
                type: string
              error:
                type: string
            additionalProperties: true
  schemas:
    Health:
      type: object
      required: [ok, service]
      properties:
        ok:
          const: true
        service:
          const: agent-trace
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string
        issues:
          type: array
          items:
            type: object
            additionalProperties: true
    TraceStatus:
      type: string
      enum: [running, success, error]
    TraceEventType:
      type: string
      enum:
        - run_started
        - run_ended
        - step_started
        - step_ended
        - llm_call
        - tool_call
        - retrieval
        - memory_update
        - error
    CreateRun:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
          minLength: 1
        name:
          type: string
          minLength: 1
        status:
          $ref: "#/components/schemas/TraceStatus"
        startedAt:
          type: string
          format: date-time
        input: {}
        metadata:
          type: object
          additionalProperties: true
    UpdateRun:
      type: object
      required: [status]
      properties:
        status:
          $ref: "#/components/schemas/TraceStatus"
        endedAt:
          oneOf:
            - type: string
              format: date-time
            - type: "null"
        output: {}
        error: {}
    Run:
      allOf:
        - $ref: "#/components/schemas/CreateRun"
        - type: object
          required: [status, startedAt]
          properties:
            endedAt:
              type: string
              format: date-time
            output: {}
            error: {}
    CreateEvent:
      type: object
      required: [id, runId, type, name, status]
      properties:
        id:
          type: string
          minLength: 1
        runId:
          type: string
          minLength: 1
        parentId:
          type: string
        type:
          $ref: "#/components/schemas/TraceEventType"
        name:
          type: string
          minLength: 1
        status:
          $ref: "#/components/schemas/TraceStatus"
        timestamp:
          type: string
          format: date-time
        durationMs:
          type: integer
          minimum: 0
        input: {}
        output: {}
        error: {}
        metadata:
          type: object
          additionalProperties: true
    Event:
      allOf:
        - $ref: "#/components/schemas/CreateEvent"
        - type: object
          required: [timestamp]
    DashboardRunPage:
      type: object
      required: [runs, pagination, summary]
      properties:
        runs:
          type: array
          items:
            $ref: "#/components/schemas/Run"
        pagination:
          $ref: "#/components/schemas/Pagination"
        summary:
          type: object
          additionalProperties: true
    DashboardEventPage:
      type: object
      required: [events, counts, facets, pagination, summary, visibility]
      properties:
        events:
          type: array
          items:
            $ref: "#/components/schemas/Event"
        counts:
          type: object
          additionalProperties: true
        facets:
          type: object
          additionalProperties: true
        pagination:
          $ref: "#/components/schemas/Pagination"
        summary:
          type: object
          additionalProperties: true
        visibility:
          type: string
          enum: [display, hidden, all]
    Pagination:
      type: object
      required: [page, pageSize, total, totalPages]
      properties:
        page:
          type: integer
          minimum: 1
        pageSize:
          type: integer
          minimum: 1
        total:
          type: integer
          minimum: 0
        totalPages:
          type: integer
          minimum: 1
    UsageRow:
      type: object
      required:
        - client
        - sessionId
        - model
        - provider
        - inputTokens
        - outputTokens
        - cacheReadTokens
        - cacheWriteTokens
        - reasoningTokens
        - totalTokens
      properties:
        client:
          type: string
        sessionId:
          type: string
        model:
          type: string
        provider:
          type: string
        inputTokens:
          type: integer
          minimum: 0
        outputTokens:
          type: integer
          minimum: 0
        cacheReadTokens:
          type: integer
          minimum: 0
        cacheWriteTokens:
          type: integer
          minimum: 0
        reasoningTokens:
          type: integer
          minimum: 0
        totalTokens:
          type: integer
          minimum: 0
        costUsd:
          type: number
          minimum: 0
        messageCount:
          type: integer
          minimum: 0
        startedAt:
          type: string
          format: date-time
        lastUsedAt:
          type: string
          format: date-time
