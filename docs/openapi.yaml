openapi: 3.1.0
info:
  title: Agent-Trace Collector API
  version: 0.0.0-unreleased
  description: |
    Local, unauthenticated Collector API for Agent-Trace. The default server is
    loopback-only and must not be exposed directly to an untrusted network.
servers:
  - url: http://127.0.0.1:4319
    description: Default local Collector
security: []
tags:
  - name: Health
  - name: Runs
  - name: Events
  - name: Integrations
  - name: Usage
  - name: Analytics
  - name: Evaluations
  - name: Sandbox
paths:
  /health:
    get:
      tags: [Health]
      summary: Check Collector health
      operationId: getHealth
      responses:
        "200":
          description: Collector is ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Health"
  /runs:
    get:
      tags: [Runs]
      summary: List Runs
      description: Returns a bounded Dashboard read model unless legacy mode is requested.
      operationId: listRuns
      parameters:
        - $ref: "#/components/parameters/IncludeUntracked"
        - $ref: "#/components/parameters/RunPage"
        - $ref: "#/components/parameters/RunPageSize"
        - name: q
          in: query
          schema: { type: string }
        - name: status
          in: query
          schema: { type: string, enum: [all, running, success, error] }
        - name: source
          in: query
          schema: { type: string }
        - name: model
          in: query
          schema: { type: string }
        - name: project
          in: query
          schema: { type: string }
        - name: environment
          in: query
          schema: { type: string }
        - name: tag
          in: query
          schema: { type: string }
        - name: favorite
          in: query
          schema: { type: boolean }
        - name: startedAfter
          in: query
          schema: { type: string, format: date-time }
        - name: startedBefore
          in: query
          schema: { type: string, format: date-time }
        - name: minCostUsd
          in: query
          schema: { type: number, minimum: 0 }
        - name: maxCostUsd
          in: query
          schema: { type: number, minimum: 0 }
        - name: sort
          in: query
          schema: { type: string, enum: [startedAt, name, status, duration, tokens, cost] }
        - name: order
          in: query
          schema: { type: string, enum: [asc, desc], default: desc }
        - $ref: "#/components/parameters/Legacy"
      responses:
        "200":
          description: Paginated Run page, or an unbounded Run array in legacy mode
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/DashboardRunPage"
                  - type: array
                    items:
                      $ref: "#/components/schemas/Run"
    post:
      tags: [Runs]
      summary: Create a Run
      operationId: createRun
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRun"
      responses:
        "201":
          $ref: "#/components/responses/Ok"
        "400":
          $ref: "#/components/responses/ValidationError"
        "409":
          description: Run id is tombstoned
    delete:
      tags: [Runs]
      summary: Delete multiple Runs
      operationId: deleteRuns
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ids]
              properties:
                ids:
                  type: array
                  minItems: 1
                  items:
                    type: string
                    minLength: 1
      responses:
        "200":
          description: Deletion result
          content:
            application/json:
              schema:
                type: object
                required: [ok, deleted]
                properties:
                  ok:
                    const: true
                  deleted:
                    type: integer
                    minimum: 0
        "400":
          $ref: "#/components/responses/ValidationError"
  /runs/{id}:
    get:
      tags: [Runs]
      summary: Get one Run
      operationId: getRun
      parameters:
        - $ref: "#/components/parameters/RunId"
      responses:
        "200":
          description: Dashboard Run with aggregate metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Run"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [Runs]
      summary: Update Run status and result
      operationId: updateRun
      parameters:
        - $ref: "#/components/parameters/RunId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRun"
      responses:
        "200":
          $ref: "#/components/responses/Ok"
        "400":
          $ref: "#/components/responses/ValidationError"
    delete:
      tags: [Runs]
      summary: Delete one Run and its Events
      operationId: deleteRun
      parameters:
        - $ref: "#/components/parameters/RunId"
      responses:
        "200":
          $ref: "#/components/responses/Ok"
        "404":
          $ref: "#/components/responses/NotFound"
  /runs/{id}/organization:
    patch:
      tags: [Runs]
      summary: Update Run project metadata and annotations
      operationId: updateRunOrganization
      parameters:
        - $ref: "#/components/parameters/RunId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                project: { type: [string, "null"], maxLength: 120 }
                environment: { type: [string, "null"], maxLength: 120 }
                version: { type: [string, "null"], maxLength: 120 }
                tags:
                  type: array
                  maxItems: 20
                  items: { type: string, minLength: 1, maxLength: 64 }
                note: { type: [string, "null"], maxLength: 2000 }
                favorite: { type: boolean }
      responses:
        "200": { $ref: "#/components/responses/Ok" }
        "400": { $ref: "#/components/responses/ValidationError" }
        "404": { $ref: "#/components/responses/NotFound" }
  /runs/{id}/events:
    get:
      tags: [Events]
      summary: List Events for a Run
      description: Returns a filtered, bounded read model unless legacy mode is requested.
      operationId: listRunEvents
      parameters:
        - $ref: "#/components/parameters/RunId"
        - name: visibility
          in: query
          schema:
            type: string
            enum: [display, hidden, all]
            default: display
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 100
        - name: q
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
        - name: type
          in: query
          schema:
            type: string
        - name: category
          in: query
          schema:
            type: string
        - $ref: "#/components/parameters/Legacy"
      responses:
        "200":
          description: Paginated Event page, or an unbounded Event array in legacy mode
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/DashboardEventPage"
                  - type: array
                    items:
                      $ref: "#/components/schemas/Event"
  /runs/{id}/export:
    get:
      tags: [Runs]
      summary: Download a metadata-redacted Run snapshot
      operationId: exportRedactedRun
      parameters:
        - $ref: "#/components/parameters/RunId"
      responses:
        "200":
          description: Redacted JSON attachment with stable pseudonymous ids
          headers:
            Content-Disposition:
              schema: { type: string }
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RedactedRunExport"
        "404":
          $ref: "#/components/responses/NotFound"
  /analytics/runs/compare:
    get:
      tags: [Analytics]
      summary: Compare two to five Runs
      operationId: compareRuns
      parameters:
        - name: ids
          in: query
          required: true
          description: Comma-separated Run ids in display order.
          schema: { type: string }
      responses:
        "200":
          description: Bounded Run comparison
          content:
            application/json:
              schema:
                type: object
                required: [runs]
                properties:
                  runs:
                    type: array
                    minItems: 0
                    maxItems: 5
                    items:
                      $ref: "#/components/schemas/DashboardRunMetric"
        "400":
          $ref: "#/components/responses/ValidationError"
  /analytics/runs/trends:
    get:
      tags: [Analytics]
      summary: Get continuous UTC daily Run trends
      operationId: getRunTrends
      parameters:
        - name: days
          in: query
          schema: { type: integer, minimum: 1, maximum: 90, default: 14 }
      responses:
        "200":
          description: Daily Run, success, duration, token, and cost aggregates
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardRunTrends"
  /runs/{id}/insights:
    get:
      tags: [Events]
      summary: Analyze deterministic Trace insights
      operationId: getRunInsights
      parameters:
        - $ref: "#/components/parameters/RunId"
      responses:
        "200":
          description: Insight list for the complete Run
          content:
            application/json:
              schema:
                type: object
                required: [insights]
                properties:
                  insights:
                    type: array
                    items: { type: object, additionalProperties: true }
  /runs/{id}/tombstone:
    delete:
      tags: [Maintenance]
      summary: Allow a deleted Run id to be ingested again
      operationId: restoreDeletedRun
      parameters:
        - $ref: "#/components/parameters/RunId"
      responses:
        "200": { $ref: "#/components/responses/Ok" }
        "404": { $ref: "#/components/responses/NotFound" }
  /events:
    post:
      tags: [Events]
      summary: Create an Event
      operationId: createEvent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEvent"
      responses:
        "201":
          $ref: "#/components/responses/Ok"
        "400":
          $ref: "#/components/responses/ValidationError"
  /integrations/codex/hook:
    post:
      tags: [Integrations]
      summary: Ingest a Codex Hook payload
      operationId: ingestCodexHook
      parameters:
        - $ref: "#/components/parameters/Surface"
        - $ref: "#/components/parameters/SurfaceSource"
      requestBody:
        $ref: "#/components/requestBodies/IntegrationPayload"
      responses:
        "202":
          $ref: "#/components/responses/IngestionResult"
  /integrations/claude-code/hook:
    post:
      tags: [Integrations]
      summary: Ingest a Claude Code Hook payload
      operationId: ingestClaudeCodeHook
      requestBody:
        $ref: "#/components/requestBodies/IntegrationPayload"
      responses:
        "202":
          $ref: "#/components/responses/IngestionResult"
  /integrations/codex/otel/v1/logs:
    post:
      tags: [Integrations]
      summary: Ingest Codex OTLP/HTTP JSON logs
      operationId: ingestCodexOtelLogs
      parameters:
        - $ref: "#/components/parameters/Surface"
        - $ref: "#/components/parameters/SurfaceSource"
      requestBody:
        $ref: "#/components/requestBodies/IntegrationPayload"
      responses:
        "202":
          $ref: "#/components/responses/IngestionResult"
  /v1/logs:
    post:
      tags: [Integrations]
      summary: Ingest OTLP/HTTP JSON logs using the desktop-compatible path
      operationId: ingestDesktopOtelLogs
      requestBody:
        $ref: "#/components/requestBodies/IntegrationPayload"
      responses:
        "202":
          $ref: "#/components/responses/IngestionResult"
  /integrations/usage-scan:
    post:
      tags: [Integrations, Usage]
      summary: Replace or merge a local Usage Snapshot
      operationId: ingestUsageScan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [source, rows]
              properties:
                source:
                  const: tokscale
                complete:
                  type: boolean
                explicitClients:
                  type: array
                  items:
                    type: string
                reconciledClients:
                  type: array
                  items:
                    type: string
                transcriptClients:
                  type: array
                  items:
                    type: string
                transcriptSessionIds:
                  type: array
                  items:
                    type: string
                scannedAt:
                  type: string
                  format: date-time
                rows:
                  type: array
                  items:
                    $ref: "#/components/schemas/UsageRow"
                diagnostics:
                  type: array
                  items:
                    type: object
                    additionalProperties: true
                transcripts:
                  type: array
                  items:
                    type: object
                    additionalProperties: true
      responses:
        "202":
          $ref: "#/components/responses/IngestionResult"
  /usage/summary:
    get:
      tags: [Usage]
      summary: Get aggregate local usage
      operationId: getUsageSummary
      responses:
        "200":
          description: Usage totals grouped by client and model
          content:
            application/json:
              schema:
                type: object
                required: [totalTokens, clients, models]
                additionalProperties: true
  /usage/scanner:
    get:
      tags: [Usage]
      summary: Get Scanner status and diagnostics
      operationId: getScannerStatus
      responses:
        "200":
          description: Latest Scanner state
          content:
            application/json:
              schema:
                type: object
                required: [diagnostics]
                properties:
                  scannedAt:
                    type: string
                    format: date-time
                  diagnostics:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
                  error:
                    type: string
  /changes:
    get:
      tags: [Read model]
      summary: Stream Collector change notifications
      operationId: streamChanges
      responses:
        "200":
          description: Server-sent event stream
          content:
            text/event-stream:
              schema: { type: string }
  /maintenance/tombstones:
    get:
      tags: [Maintenance]
      summary: List deleted Run tombstones
      operationId: listRunTombstones
      parameters:
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
      responses:
        "200":
          description: Bounded tombstone list
          content:
            application/json:
              schema: { type: object, additionalProperties: true }
  /maintenance/privacy:
    get:
      tags: [Maintenance]
      summary: Get pre-storage redaction settings
      operationId: getPrivacySettings
      responses:
        "200":
          description: Sensitive keys and replacement text
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PrivacySettings" }
    put:
      tags: [Maintenance]
      summary: Replace pre-storage redaction settings
      operationId: updatePrivacySettings
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PrivacySettings" }
      responses:
        "200":
          description: Persisted privacy settings
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PrivacySettings" }
        "400": { $ref: "#/components/responses/ValidationError" }
  /maintenance/storage:
    get:
      tags: [Maintenance]
      summary: Get database capacity counters
      operationId: getStorageStats
      responses:
        "200":
          description: Database path, byte size, and row counts
          content:
            application/json:
              schema: { type: object, additionalProperties: true }
  /maintenance/prune:
    post:
      tags: [Maintenance]
      summary: Delete Runs older than a cutoff
      operationId: pruneRuns
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [before]
              properties:
                before: { type: string, format: date-time }
                statuses:
                  type: array
                  items: { type: string }
                keepTombstones: { type: boolean, default: true }
      responses:
        "200": { $ref: "#/components/responses/Ok" }
        "400": { $ref: "#/components/responses/ValidationError" }
  /maintenance/compact:
    post:
      tags: [Maintenance]
      summary: Checkpoint WAL and vacuum the database
      operationId: compactDatabase
      responses:
        "200": { $ref: "#/components/responses/Ok" }
  /v1/traces:
    post:
      tags: [Integrations]
      summary: Ingest OTLP JSON traces
      operationId: ingestOtlpTraces
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object, additionalProperties: true }
      responses:
        "202": { description: Trace payload accepted }
  /integrations/otlp/v1/traces:
    post:
      tags: [Integrations]
      summary: Ingest OTLP JSON traces through the explicit integration path
      operationId: ingestIntegrationOtlpTraces
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object, additionalProperties: true }
      responses:
        "202": { description: Trace payload accepted }
  /analytics/breakdown:
    get:
      tags: [Analytics]
      summary: Aggregate Run metrics by a business dimension
      operationId: getAnalyticsBreakdown
      parameters:
        - name: dimension
          in: query
          schema: { type: string, enum: [project, environment, model, source], default: project }
        - name: days
          in: query
          schema: { type: integer, minimum: 1, maximum: 90, default: 14 }
      responses:
        "200": { description: Dimension groups with quality, duration, token, and cost metrics }
        "400": { $ref: "#/components/responses/ValidationError" }
  /analytics/budgets:
    get:
      tags: [Analytics]
      summary: List analytics budgets
      operationId: listAnalyticsBudgets
      responses:
        "200": { description: Budget list }
    post:
      tags: [Analytics]
      summary: Create an analytics budget
      operationId: createAnalyticsBudget
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object, additionalProperties: true }
      responses:
        "201": { description: Budget created }
        "400": { $ref: "#/components/responses/ValidationError" }
  /analytics/budgets/{id}:
    delete:
      tags: [Analytics]
      summary: Delete an analytics budget
      operationId: deleteAnalyticsBudget
      parameters:
        - $ref: "#/components/parameters/RunId"
      responses:
        "200": { $ref: "#/components/responses/Ok" }
        "404": { description: Budget not found }
  /analytics/alerts:
    get:
      tags: [Analytics]
      summary: List current budget alerts
      operationId: getAnalyticsAlerts
      responses:
        "200": { description: Current daily and monthly threshold violations }
  /evaluations/datasets:
    get:
      tags: [Evaluations]
      summary: List evaluation datasets
      operationId: listEvaluationDatasets
      responses:
        "200": { description: Evaluation dataset summaries }
    post:
      tags: [Evaluations]
      summary: Create an evaluation dataset
      operationId: createEvaluationDataset
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object, additionalProperties: true }
      responses:
        "201": { description: Evaluation dataset created }
        "400": { $ref: "#/components/responses/ValidationError" }
  /evaluations/datasets/{id}:
    get:
      tags: [Evaluations]
      summary: Get an evaluation dataset report
      operationId: getEvaluationDataset
      parameters:
        - $ref: "#/components/parameters/RunId"
      responses:
        "200": { description: Dataset, cases, results, and aggregate quality }
        "404": { description: Evaluation dataset not found }
  /evaluations/datasets/{id}/cases:
    post:
      tags: [Evaluations]
      summary: Add an evaluation case
      operationId: createEvaluationCase
      parameters:
        - $ref: "#/components/parameters/RunId"
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object, additionalProperties: true }
      responses:
        "201": { description: Evaluation case created }
        "404": { description: Evaluation dataset not found }
  /evaluations/results:
    post:
      tags: [Evaluations]
      summary: Record or replace a Run evaluation result
      operationId: recordEvaluationResult
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object, additionalProperties: true }
      responses:
        "201": { description: Weighted quality score recorded }
        "404": { description: Evaluation case or Run not found }
  /sandbox/replays:
    get:
      tags: [Sandbox]
      summary: List safe replay tasks
      operationId: listReplayTasks
      parameters:
        - name: sourceRunId
          in: query
          schema: { type: string }
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
      responses:
        "200": { description: Replay task list }
    post:
      tags: [Sandbox]
      summary: Create a mock-only replay task
      operationId: createReplayTask
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [sourceRunId, sourceEventId]
              properties:
                sourceRunId: { type: string, minLength: 1 }
                sourceEventId: { type: string, minLength: 1 }
                input: {}
                mockOutput: {}
                simulateError: { type: boolean, default: false }
                delayMs: { type: integer, minimum: 0, maximum: 30000, default: 0 }
                timeoutMs: { type: integer, minimum: 100, maximum: 30000, default: 5000 }
      responses:
        "202": { description: Replay task queued }
        "400": { description: Request failed validation }
        "404": { description: Source Run or Event not found }
        "413": { description: Replay payload is too large }
  /sandbox/replays/{id}:
    get:
      tags: [Sandbox]
      summary: Get one replay task
      operationId: getReplayTask
      parameters:
        - $ref: "#/components/parameters/RunId"
      responses:
        "200": { description: Replay task }
        "404": { description: Replay task not found }
    delete:
      tags: [Sandbox]
      summary: Cancel a queued or running replay task
      operationId: cancelReplayTask
      parameters:
        - $ref: "#/components/parameters/RunId"
      responses:
        "200": { description: Replay task cancelled or current terminal task returned }
        "404": { description: Replay task not found }
components:
  parameters:
    RunId:
      name: id
      in: path
      required: true
      schema:
        type: string
    IncludeUntracked:
      name: includeUntracked
      in: query
      schema:
        type: boolean
        default: false
    RunPage:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    RunPageSize:
      name: pageSize
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 50
    Legacy:
      name: legacy
      in: query
      description: Return the old unbounded array response.
      schema:
        type: boolean
        default: false
    Surface:
      name: surface
      in: query
      schema:
        type: string
    SurfaceSource:
      name: surface_source
      in: query
      schema:
        type: string
  requestBodies:
    IntegrationPayload:
      required: true
      content:
        application/json:
          schema:
            type: object
            additionalProperties: true
  responses:
    Ok:
      description: Operation succeeded
      content:
        application/json:
          schema:
            type: object
            required: [ok]
            properties:
              ok:
                const: true
    ValidationError:
      description: Request failed validation
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: Run was not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    IngestionResult:
      description: Request was accepted; inspect stored and error for normalization result.
      content:
        application/json:
          schema:
            type: object
            required: [ok]
            properties:
              ok:
                const: true
              stored:
                oneOf:
                  - type: boolean
                  - type: integer
                    minimum: 0
              runId:
                type: string
              eventId:
                type: string
              error:
                type: string
            additionalProperties: true
  schemas:
    PrivacySettings:
      type: object
      required: [sensitiveKeys, replacement]
      properties:
        sensitiveKeys:
          type: array
          maxItems: 100
          items: { type: string, minLength: 1, maxLength: 120 }
        replacement: { type: string, minLength: 1, maxLength: 120 }
    Health:
      type: object
      required: [ok, service]
      properties:
        ok:
          const: true
        service:
          const: agent-trace
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string
        issues:
          type: array
          items:
            type: object
            additionalProperties: true
    TraceStatus:
      type: string
      enum: [running, success, error]
    TraceEventType:
      type: string
      enum:
        - run_started
        - run_ended
        - step_started
        - step_ended
        - llm_call
        - tool_call
        - retrieval
        - memory_update
        - error
    CreateRun:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
          minLength: 1
        name:
          type: string
          minLength: 1
        status:
          $ref: "#/components/schemas/TraceStatus"
        startedAt:
          type: string
          format: date-time
        input: {}
        metadata:
          type: object
          additionalProperties: true
    UpdateRun:
      type: object
      required: [status]
      properties:
        status:
          $ref: "#/components/schemas/TraceStatus"
        endedAt:
          oneOf:
            - type: string
              format: date-time
            - type: "null"
        output: {}
        error: {}
    Run:
      allOf:
        - $ref: "#/components/schemas/CreateRun"
        - type: object
          required: [status, startedAt]
          properties:
            endedAt:
              type: string
              format: date-time
            output: {}
            error: {}
    CreateEvent:
      type: object
      required: [id, runId, type, name, status]
      properties:
        id:
          type: string
          minLength: 1
        runId:
          type: string
          minLength: 1
        parentId:
          type: string
        type:
          $ref: "#/components/schemas/TraceEventType"
        name:
          type: string
          minLength: 1
        status:
          $ref: "#/components/schemas/TraceStatus"
        timestamp:
          type: string
          format: date-time
        durationMs:
          type: integer
          minimum: 0
        input: {}
        output: {}
        error: {}
        metadata:
          type: object
          additionalProperties: true
    Event:
      allOf:
        - $ref: "#/components/schemas/CreateEvent"
        - type: object
          required: [timestamp]
    DashboardRunPage:
      type: object
      required: [runs, pagination, summary]
      properties:
        runs:
          type: array
          items:
            $ref: "#/components/schemas/Run"
        pagination:
          $ref: "#/components/schemas/Pagination"
        summary:
          type: object
          additionalProperties: true
    RedactedRunExport:
      type: object
      required: [schemaVersion, exportedAt, redaction, run, events]
      properties:
        schemaVersion: { type: integer, const: 1 }
        exportedAt: { type: string, format: date-time }
        redaction: { type: string, const: metadata }
        run:
          type: object
          required: [id, name, status, startedAt]
          properties:
            id: { type: string, pattern: '^run-[a-f0-9]{12}$' }
            name: { type: string, const: redacted-run }
            status: { type: string }
            startedAt: { type: string, format: date-time }
            endedAt: { type: string, format: date-time }
            metadata: { type: object, additionalProperties: true }
        events:
          type: array
          items:
            type: object
            required: [id, runId, type, name, status, timestamp]
            properties:
              id: { type: string, pattern: '^event-[a-f0-9]{12}$' }
              runId: { type: string, pattern: '^run-[a-f0-9]{12}$' }
              parentId: { type: string, pattern: '^event-[a-f0-9]{12}$' }
              type: { type: string }
              name: { type: string }
              status: { type: string }
              timestamp: { type: string, format: date-time }
              durationMs: { type: integer, minimum: 0 }
              metadata: { type: object, additionalProperties: true }
    DashboardRunMetric:
      type: object
      required: [id, name, status, startedAt, durationMs, eventCount, failedEventCount, totalTokens, costUsd]
      properties:
        id: { type: string }
        name: { type: string }
        status: { type: string }
        startedAt: { type: string, format: date-time }
        durationMs: { type: integer, minimum: 0 }
        eventCount: { type: integer, minimum: 0 }
        failedEventCount: { type: integer, minimum: 0 }
        totalTokens: { type: integer, minimum: 0 }
        costUsd: { type: number, minimum: 0 }
    DashboardRunTrends:
      type: object
      required: [days, points]
      properties:
        days: { type: integer, minimum: 1, maximum: 90 }
        points:
          type: array
          maxItems: 90
          items:
            type: object
            required: [date, runCount, successfulRunCount, failedRunCount, averageDurationMs, totalTokens, costUsd]
            properties:
              date: { type: string, format: date }
              runCount: { type: integer, minimum: 0 }
              successfulRunCount: { type: integer, minimum: 0 }
              failedRunCount: { type: integer, minimum: 0 }
              averageDurationMs: { type: integer, minimum: 0 }
              totalTokens: { type: integer, minimum: 0 }
              costUsd: { type: number, minimum: 0 }
    DashboardEventPage:
      type: object
      required: [events, counts, facets, pagination, summary, visibility]
      properties:
        events:
          type: array
          items:
            $ref: "#/components/schemas/Event"
        counts:
          type: object
          additionalProperties: true
        facets:
          type: object
          additionalProperties: true
        pagination:
          $ref: "#/components/schemas/Pagination"
        summary:
          type: object
          additionalProperties: true
        visibility:
          type: string
          enum: [display, hidden, all]
    Pagination:
      type: object
      required: [page, pageSize, total, totalPages]
      properties:
        page:
          type: integer
          minimum: 1
        pageSize:
          type: integer
          minimum: 1
        total:
          type: integer
          minimum: 0
        totalPages:
          type: integer
          minimum: 1
    UsageRow:
      type: object
      required:
        - client
        - sessionId
        - model
        - provider
        - inputTokens
        - outputTokens
        - cacheReadTokens
        - cacheWriteTokens
        - reasoningTokens
        - totalTokens
      properties:
        client:
          type: string
        sessionId:
          type: string
        model:
          type: string
        provider:
          type: string
        inputTokens:
          type: integer
          minimum: 0
        outputTokens:
          type: integer
          minimum: 0
        cacheReadTokens:
          type: integer
          minimum: 0
        cacheWriteTokens:
          type: integer
          minimum: 0
        reasoningTokens:
          type: integer
          minimum: 0
        totalTokens:
          type: integer
          minimum: 0
        costUsd:
          type: number
          minimum: 0
        messageCount:
          type: integer
          minimum: 0
        startedAt:
          type: string
          format: date-time
        lastUsedAt:
          type: string
          format: date-time
